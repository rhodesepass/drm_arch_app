loop_on_disconnect 1

storage "/"           "rootfs" "rw"
storage "/root"       "home" "rw"
storage "/assets"     "assets" "rw"
storage "/app"        "app" "rw"
storage "/dispimg"    "display images" "rw"
storage "/root/themes" "Themes" "rw"
storage "/mnt/epass-data/apps-inbox" "App Packages" "rw"
storage "/mnt/epass-data/import-log" "Import Log" "rw"
storage "/root/splash" "Boot Splash" "rw"
storage "/tmp"        "tmp" "rw"

manufacturer "Rhodes Island"
product "Electronic Pass"
serial "EPASS00001"
interface "MTP"

usb_vendor_id  0x1D6B
usb_product_id 0x0100
usb_class 0x6
usb_subclass 0x1
usb_protocol 0x1
usb_dev_version 0x3008

usb_functionfs_mode 0x1
usb_dev_path   "/dev/ffs-mtp/ep0"
usb_epin_path  "/dev/ffs-mtp/ep1"
usb_epout_path "/dev/ffs-mtp/ep2"
usb_epint_path "/dev/ffs-mtp/ep3"
usb_max_packet_size 0x200
